version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-testcase-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "14110:14110"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
